{% include "header.html" %}

<!-- Page Header -->
<header class="masthead" style="background-image: url('../static/assets/img/home-bg.png')">
  <div class="container position-relative px-4 px-lg-5">
    <div class="row gx-4 gx-lg-5 justify-content-center">
      <div class="col-md-10 col-lg-8 col-xl-7">
        <div class="page-heading">
          <h1>Site Statistics</h1>
          <span class="subheading">Powered by AWS DynamoDB</span>
        </div>
      </div>
    </div>
  </div>
</header>

<div class="container px-4 px-lg-5 my-5">
  <div class="row justify-content-center">
    <div class="col-md-10 col-lg-8">
      <p class="mb-4">Total page views: <strong>{{ total }}</strong></p>

      <h5 class="fw-bold mb-3">Page views (last 30 days)</h5>
      <canvas id="visitorChart" height="100"></canvas>

      {% if countries %}
      <hr class="my-5">
      <h5 class="fw-bold mb-3">Visitors by country</h5>
      <div class="row">
        <div class="col-md-6 mb-4">
          <canvas id="countryChart" height="200"></canvas>
        </div>
        <div class="col-md-6">
          <table class="table table-sm">
            <thead>
              <tr>
                <th>Country</th>
                <th class="text-end">Views</th>
              </tr>
            </thead>
            <tbody>
              {% for c in countries %}
              <tr>
                <td>{{ c.country }}</td>
                <td class="text-end">{{ c.count }}</td>
              </tr>
              {% endfor %}
            </tbody>
          </table>
        </div>
      </div>
      {% endif %}
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  const ctx = document.getElementById('visitorChart').getContext('2d');
  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: {{ data | map(attribute='date') | list | tojson }},
      datasets: [{
        label: 'Page views per day',
        data: {{ data | map(attribute='count') | list | tojson }},
        backgroundColor: 'rgba(0, 133, 161, 0.6)',
        borderColor: 'rgba(0, 133, 161, 1)',
        borderWidth: 1
      }]
    },
    options: {
      scales: {
        y: { beginAtZero: true, ticks: { stepSize: 1 } },
        x: { ticks: { maxRotation: 45, font: { size: 10 } } }
      },
      plugins: { legend: { display: false } }
    }
  });

  {% if countries %}
  const countryCtx = document.getElementById('countryChart').getContext('2d');
  new Chart(countryCtx, {
    type: 'doughnut',
    data: {
      labels: {{ countries | map(attribute='country') | list | tojson }},
      datasets: [{
        data: {{ countries | map(attribute='count') | list | tojson }},
        backgroundColor: [
          'rgba(0, 133, 161, 0.8)',
          'rgba(54, 162, 235, 0.8)',
          'rgba(75, 192, 192, 0.8)',
          'rgba(153, 102, 255, 0.8)',
          'rgba(255, 159, 64, 0.8)',
          'rgba(255, 99, 132, 0.8)',
          'rgba(201, 203, 207, 0.8)',
          'rgba(255, 205, 86, 0.8)'
        ]
      }]
    },
    options: {
      plugins: {
        legend: { position: 'bottom', labels: { font: { size: 12 } } }
      }
    }
  });
  {% endif %}
</script>

{% include "footer.html" %}
